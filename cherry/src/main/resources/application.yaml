spring:
  application:
    name: cherry
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev,local}

mybatis:
  mapper-locations: classpath:mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true

app:
  cors:
    allowed-origin-patterns:
      - http://localhost:3000
      - http://127.0.0.1:3000
    allowed-methods:
      - GET
      - POST
      - PUT
      - PATCH
      - DELETE
      - OPTIONS
      - HEAD
    allowed-headers:
      - "*"
    allow-credentials: true
    max-age: 3600
  jwt:
    # HS256 至少需要 256 bit（32 字节）；生产务必通过环境变量覆盖
    secret: ${APP_JWT_SECRET:cherry-oj-dev-jwt-secret-min-32-bytes-long!!}
    expiration-ms: ${APP_JWT_EXPIRATION_MS:86400000}
    cookie-name: ${APP_JWT_COOKIE_NAME:cherry_jwt}
    cookie-path: /
    cookie-secure: ${APP_JWT_COOKIE_SECURE:false}
